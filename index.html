<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Глент переписка</title>
    <style>
        :root {
            --bg: #0e1621;
            --bot: #182533;
            --user: #2b5278;
            --text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Заголовок как в ТГ */
        .header {
            background: var(--bot);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #000;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: url('https://avatars.mds.yandex.net/i?id=4eca882ed04d39d446c3f89d812323f0_l-4598658-images-thumbs&n=13') center/cover;
        }

        /* Чат-зона */
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }

        .msg {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 15px;
            color: var(--text);
            font-size: 16px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bot-msg { background: var(--bot); align-self: flex-start; border-bottom-left-radius: 2px; }
        .my-msg { background: var(--user); align-self: flex-end; border-bottom-right-radius: 2px; }

        /* Поле ввода */
        .input-area {
            background: var(--bot);
            padding: 10px;
            display: flex;
            gap: 10px;
            padding-bottom: env(safe-area-inset-bottom); /* Учет челок и вырезов */
        }

        input {
            flex: 1;
            background: #0e1621;
            border: none;
            padding: 12px 15px;
            border-radius: 20px;
            color: white;
            outline: none;
            font-size: 16px;
        }

        button { background: none; border: none; color: #6fbcf0; font-weight: bold; padding: 0 10px; }
    </style>
</head>
<body>

<div class="header">
    <div class="avatar"></div>
    <div style="color:white; font-weight:bold;">Глент <br> <span style="font-size:12px; color:#6fbcf0; font-weight:normal;">в сети</span></div>
</div>

<div id="chat-box">
    <div class="msg bot-msg">Йо йо йо это Глент! Рассказывай какой план, кого сегодня пранканем!</div>
</div>

<form class="input-area" id="form">
    <input type="text" id="input" placeholder="Сообщение..." autocomplete="off">
    <button type="submit">Отпр.</button>
</form>

<script>
    const phrases = ["Ну что, готов к контенту? У меня тут идей на миллион!", "Эй, ну чего молчишь? Давай какой-нибудь лютый пранк замутим!", "Это будет легендарно, я тебе отвечаю!", "Так, я камеру уже настроил, начинаем?", "А ты уверен, что это безопасно? Хотя... погнали!", "Слушай, а если мы сделаем вот так — это будет просто топ!", "Глент в здании, всем приготовиться к безумию!", "Давай добавим больше динамики, зрители любят экшн!", "Хей-хей, ты не поверишь, что я придумал для следующего ролика!", "Главное — эффект неожиданности, понял?", "Ну всё, сейчас будем делать историю, бро!", "Ты видел этот уровень хайпа? Мы переплюнем всех!", "Может, попробуем что-то совсем безумное?", "Так, план такой: влетаем, шутим, убегаем!", "Ты красава, отличная задумка!", "Спокойно, я всё контролирую, главное — не палиться.", "Нам нужно больше спецэффектов и громкий звук!", "Этот пранк точно залетит в тренды, я чувствую!", "А теперь давай сделаем вид, что ничего не было, ха-ха!", "Мне нравится твой настрой, работаем!", "Осторожнее, главное — не переборщить!", "Давай по новой, в этот раз еще эпичнее!", "Это будет лучший выпуск на канале, вот увидишь!", "Слушай, а давай пригласим кого-то еще для массовки?", "Я тут подумал: а что если...?", "Красиво зашло, ты видел лица людей?", "Заряжен на все сто, погнали делать шоу!", "Бро, это лучший день для пранков!", "Всё, отключаем камеры, идем монтировать!"];

    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const chatBox = document.getElementById('chat-box');

    form.onsubmit = (e) => {
        e.preventDefault();
        if(!input.value) return;
        
        chatBox.innerHTML += `<div class="msg my-msg">${input.value}</div>`;
        input.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;

        setTimeout(() => {
            chatBox.innerHTML += `<div class="msg bot-msg">${phrases[Math.floor(Math.random() * phrases.length)]}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }, 600);
    }
</script>
</body>
</html>
